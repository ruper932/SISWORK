<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SISWORK — Acceso</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <main class="auth-shell">
    <div class="brand">
      <div class="brand-mark">SW</div>
      <span class="brand-name">SISWORK</span>
    </div>

    <div class="card">
      <div class="card-header">
        <h1>Bienvenido</h1>
        <p>Ingresa tus credenciales para continuar</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Correo electrónico</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none">
              <path d="M2.5 5.5A1.5 1.5 0 014 4h12a1.5 1.5 0 011.5 1.5v9A1.5 1.5 0 0116 16H4a1.5 1.5 0 01-1.5-1.5v-9z" stroke="currentColor" stroke-width="1.4"/>
              <path d="M2.5 6l7.5 5 7.5-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <input type="email" id="email" name="email" placeholder="usuario@siswork.com" autocomplete="email" required />
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field">
          <label for="password">
            Contraseña
            <a href="#" class="forgot-link" id="forgotLink">¿Olvidaste tu contraseña?</a>
          </label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none">
              <rect x="4" y="9" width="12" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
              <svg id="eyeIcon" viewBox="0 0 20 20" fill="none">
                <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="remember-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember" name="remember" />
            <span class="checkmark"></span>
            Mantener sesión iniciada
          </label>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-text">Iniciar sesión</span>
          <span class="btn-spinner" id="btnSpinner" hidden>
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-dasharray="32" stroke-dashoffset="32"><animate attributeName="stroke-dashoffset" values="32;0" dur="0.6s" repeatCount="indefinite"/></circle></svg>
          </span>
        </button>

        <div class="alert" id="alertBox" hidden>
          <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.4"/><path d="M10 6v4m0 2.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span id="alertMsg"></span>
        </div>
      </form>
    </div>

    <footer class="auth-footer">
      <span>© 2025 SISWORK</span>
      <span>·</span>
      <a href="#">Soporte</a>
    </footer>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
